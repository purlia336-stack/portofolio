    <section style="min-height: 80vh;">
        <div class="container py-4">
            <div class="text-center mb-5">
                <h2 class="fw-bold">Hubungi Kami</h2>
                <p class="text-muted">Kirimkan masukan atau pesan langsung ke administrator</p>
            </div>
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <form id="contactForm" class="bg-light p-4 rounded-4 shadow-sm">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nama Lengkap</label>
                            <input type="text" class="form-control p-3" required placeholder="Masukkan nama Anda">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email Aktif</label>
                            <input type="email" class="form-control p-3" required placeholder="name@example.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Isi Pesan</label>
                            <textarea class="form-control p-3" rows="4" required placeholder="Tuliskan pertanyaan Anda..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-custom-primary w-100 py-3 mt-2">Kirim Pesan Masukan</button>
                    </form>
                </div>
            </div>
        </div>
    </section>
