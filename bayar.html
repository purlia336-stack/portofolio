</head>
<body class="bg-premium-light">

    <nav class="navbar navbar-expand-lg navbar-dark custom-nav sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Studio<span style="color: #2dd4bf;">Digital.</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Beranda</a></li>
                    <li class="nav-item"><a class="nav-link" href="tentang.html">Tentang</a></li>

                    <li class="nav-item"><a class="nav-link" href="kontak.html">Kontak</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5" style="min-height: 80vh;">
        <div class="row justify-content-center py-4">
            <div class="col-md-6">
                <div class="card shadow-sm border-0 rounded-4 p-3">
                    <div class="card-body">
                        <h3 class="card-title fw-bold mb-4 text-center text-dark">Form Pembayaran</h3>
                        <form id="paymentForm">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Pilih Paket Layanan</label>
                                <select class="form-select p-3" id="produk">
                                    <option>Pilihan Reguler</option>
                                    <option>Pilihan Premium</option>
                                </select>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Metode Transaksi</label>
                                <select class="form-select p-3">
                                    <option>Transfer Bank Virtual Account</option>
                                    <option>E-Wallet (Dana / OVO / Gopay)</option>
                                    <option>COD (Bayar di Tempat)</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-custom-primary w-100 py-3 text-uppercase tracking-wide">Konfirmasi Sekarang</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
